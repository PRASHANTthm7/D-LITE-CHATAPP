services:
  frontend:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - SUPABASE_URL=http://host.docker.internal:54321
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend-service:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - core-backend
      - realtime-service
      - call-service
      - ai-backend

  core-backend:
    build:
      context: ./core-backend
      dockerfile: Dockerfile
    ports:
      - "5040:5040"
    environment:
      - ENV=development
    command: uvicorn main:app --host 0.0.0.0 --port 5040 --reload
    volumes:
      - ./core-backend:/app

  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    environment:
      - ENV=development
    command: uvicorn main:socket_app --host 0.0.0.0 --port 5050 --reload
    volumes:
      - ./realtime-service:/app

  call-service:
    build:
      context: ./call-service
      dockerfile: Dockerfile
    ports:
      - "5060:5060"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./call-service:/app
      - /app/node_modules

  ai-backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    ports:
      - "5070:5070"
    environment:
      - ENV=development
    command: uvicorn main:app --host 0.0.0.0 --port 5070 --reload
    volumes:
      - ./ai-backend:/app
